<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صورك من العرس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:    #C9A84C;
    --gold2:   #E8C97A;
    --dark:    #0A0A0F;
    --dark2:   #13131C;
    --dark3:   #1C1C2E;
    --text:    #F0EDE8;
    --muted:   #888;
    --radius:  20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(201,168,76,.08) 0%, transparent 55%);
    pointer-events: none;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 40px 24px 0;
    text-align: center;
    position: relative;
  }

  .ornament {
    display: block;
    font-size: 28px;
    letter-spacing: 12px;
    color: var(--gold);
    opacity: .6;
    margin-bottom: 16px;
    animation: fadeIn 1s ease both;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold2) 0%, var(--gold) 50%, #a07830 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeIn 1s .2s ease both;
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 300;
    animation: fadeIn 1s .4s ease both;
  }

  /* ── Divider ── */
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px auto;
    animation: fadeIn 1s .5s ease both;
  }

  /* ── Card ── */
  .card {
    width: min(480px, 92vw);
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,.18);
    border-radius: var(--radius);
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
    animation: slideUp .8s .3s cubic-bezier(.16,1,.3,1) both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── Drop zone ── */
  .drop-zone {
    border: 2px dashed rgba(201,168,76,.35);
    border-radius: 14px;
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: rgba(201,168,76,.03);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,168,76,.07);
    transform: scale(1.01);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 52px;
    margin-bottom: 14px;
    display: block;
    transition: transform .3s;
  }

  .drop-zone:hover .drop-icon { transform: scale(1.1); }

  .drop-label {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text);
  }

  .drop-sub {
    font-size: .85rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── Preview ── */
  #preview-wrap {
    display: none;
    margin-top: 20px;
    text-align: center;
    animation: fadeIn .4s ease;
  }

  #preview-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--gold);
    box-shadow: 0 0 24px rgba(201,168,76,.3);
  }

  .preview-name {
    margin-top: 10px;
    font-size: .9rem;
    color: var(--muted);
  }

  /* ── Button ── */
  .btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #0A0A0F;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .5px;
  }

  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,168,76,.35);
  }

  .btn:disabled {
    opacity: .6;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Loader ── */
  #loader {
    display: none;
    text-align: center;
    padding: 32px 0;
    animation: fadeIn .3s;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(201,168,76,.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  .loader-text {
    color: var(--muted);
    font-size: .95rem;
  }

  /* ── Results ── */
  #results {
    display: none;
    margin-top: 28px;
    animation: slideUp .5s ease;
  }

  .results-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .results-count {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
  }

  .results-sub {
    font-size: .9rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .photo-item {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,.15);
    background: var(--dark3);
    transition: transform .2s, box-shadow .2s;
  }

  .photo-item:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    border-color: rgba(201,168,76,.4);
  }

  .photo-link {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 12px;
    text-decoration: none;
    color: var(--gold);
    font-size: .85rem;
    font-weight: 500;
    gap: 8px;
    text-align: center;
  }

  /* ── Error ── */
  .error-box {
    background: rgba(255,80,80,.08);
    border: 1px solid rgba(255,80,80,.25);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    color: #ff8080;
    font-size: .9rem;
    margin-top: 20px;
    display: none;
    animation: fadeIn .3s;
  }

  /* ── Empty state ── */
  .empty-box {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: .95rem;
    display: none;
  }

  /* ── Reset ── */
  .reset-btn {
    display: block;
    margin: 20px auto 0;
    background: none;
    border: 1px solid rgba(201,168,76,.3);
    color: var(--gold);
    font-family: 'Tajawal', sans-serif;
    font-size: .9rem;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
  }

  .reset-btn:hover {
    background: rgba(201,168,76,.08);
    border-color: var(--gold);
  }

  /* ── Footer ── */
  footer {
    margin: 48px 0 32px;
    text-align: center;
    color: rgba(255,255,255,.15);
    font-size: .8rem;
    animation: fadeIn 1s 1s ease both;
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<header>
  <span class="ornament">✦ ✦ ✦</span>
  <h1>ابحث عن صورك</h1>
  <p class="subtitle">ارفع سيلفي واحد وسنجد كل صورك من العرس</p>
  <div class="divider"></div>
</header>

<div class="card">

  <!-- Upload zone -->
  <div id="upload-section">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" capture="user">
      <span class="drop-icon">📸</span>
      <p class="drop-label">ارفع صورة سيلفي</p>
      <p class="drop-sub">أو اضغط هنا لالتقاط صورة من الكاميرا</p>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview">
      <p class="preview-name">صورتك جاهزة ✓</p>
    </div>

    <button class="btn" id="search-btn" disabled onclick="searchPhotos()">
      🔍 ابحث عن صوري
    </button>
  </div>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <p class="loader-text">جاري البحث في صور العرس...</p>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <p class="results-count" id="results-count"></p>
      <p class="results-sub">اضغط على أي صورة لتحميلها</p>
    </div>
    <div class="photo-grid" id="photo-grid"></div>
    <div class="empty-box" id="empty-box">
      😕 ما لقيت صورك. تأكد أن السيلفي واضح وجرب مرة ثانية.
    </div>
    <button class="reset-btn" onclick="reset()">↩ جرب سيلفي ثاني</button>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box"></div>

</div>

<footer>
  نظام التعرف على الوجه — خاص ومشفر
</footer>

<script>
  const fileInput  = document.getElementById('file-input');
  const dropZone   = document.getElementById('drop-zone');
  const previewWrap= document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const searchBtn  = document.getElementById('search-btn');
  const loader     = document.getElementById('loader');
  const results    = document.getElementById('results');
  const errorBox   = document.getElementById('error-box');
  const photoGrid  = document.getElementById('photo-grid');
  const emptyBox   = document.getElementById('empty-box');
  const uploadSec  = document.getElementById('upload-section');

  let selectedFile = null;

  // Drag & drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      previewWrap.style.display = 'block';
      searchBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  async function searchPhotos() {
    if (!selectedFile) return;

    uploadSec.style.display = 'none';
    loader.style.display    = 'block';
    errorBox.style.display  = 'none';

    try {
      const formData = new FormData();
      formData.append('selfie', selectedFile);

      const resp = await fetch('/search', { method: 'POST', body: formData });
      if (!resp.ok) throw new Error('خطأ في الخادم');

      const data = await resp.json();

      loader.style.display  = 'none';
      results.style.display = 'block';

      if (data.found === 0 || !data.photos.length) {
        emptyBox.style.display = 'block';
        document.getElementById('results-count').textContent = '';
      } else {
        document.getElementById('results-count').textContent =
          `وجدنا ${data.found} صورة لك 🎉`;

        photoGrid.innerHTML = data.photos.map((url, i) => `
          <div class="photo-item">
            <a class="photo-link" href="${url}" target="_blank" rel="noopener">
              📷 صورة ${i + 1}
            </a>
          </div>
        `).join('');
      }

    } catch (err) {
      loader.style.display   = 'none';
      uploadSec.style.display = 'block';
      errorBox.style.display = 'block';
      errorBox.textContent   = '⚠️ حدث خطأ. تأكد من اتصالك وحاول مرة ثانية.';
    }
  }

  function reset() {
    selectedFile           = null;
    fileInput.value        = '';
    previewImg.src         = '';
    previewWrap.style.display = 'none';
    searchBtn.disabled     = true;
    results.style.display  = 'none';
    emptyBox.style.display = 'none';
    photoGrid.innerHTML    = '';
    uploadSec.style.display = 'block';
    document.getElementById('results-count').textContent = '';
  }
</script>
</body>
</html>
